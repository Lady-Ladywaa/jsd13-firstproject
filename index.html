<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #faf7f2;
            color: #2c2c2c;
            min-height: 100vh;
        }

        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            text-align: center;
            padding: 80px 24px 60px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,165,0,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            position: relative;
        }

        .hero h1 span {
            color: #f0a500;
        }

        .hero p {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(255,255,255,0.7);
            margin-top: 12px;
            position: relative;
        }

        .hero .divider {
            width: 60px;
            height: 3px;
            background: #f0a500;
            margin: 20px auto 0;
            border-radius: 2px;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px;
        }

        .menu-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
        }

        .menu-card .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #e8e0d6;
        }

        .menu-card .card-body {
            padding: 20px 24px 24px;
        }

        .menu-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .menu-card .card-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        .menu-card .card-price {
            font-size: 1.15rem;
            font-weight: 600;
            color: #f0a500;
            white-space: nowrap;
            margin-left: 12px;
        }

        .menu-card .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0 0;
        }

        .menu-card .tag {
            font-size: 0.75rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            background: #f0ebe3;
            color: #5b4e3e;
            letter-spacing: 0.3px;
        }

        .menu-card .tag.origin {
            background: #e8f0fe;
            color: #1a56db;
        }

        .menu-card .tag.veg {
            background: #e6f7e6;
            color: #2e7d32;
        }

        .menu-card .tag.non-veg {
            background: #fde8e8;
            color: #c62828;
        }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: #888;
            font-size: 1.1rem;
        }

        .footer-bar {
            text-align: center;
            padding: 32px 24px;
            color: #999;
            font-size: 0.85rem;
            border-top: 1px solid #e8e0d6;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2.2rem; }
            .container { padding: 40px 16px; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Gourmet <span>Menu</span></h1>
        <p>Handcrafted dishes with passion & tradition</p>
        <div class="divider"></div>
    </section>

    <div class="container">
        <div id="menuContainer" class="menu-grid"></div>
    </div>

    <div class="footer-bar">
        &copy; 2026 Gourmet Menu &mdash; curated with care
    </div>

    <script src="my-array.js"></script>
    <script src="my-object.js"></script>
    <script>
        (function() {
            const container = document.getElementById('menuContainer');

            if (!fooddatabase || fooddatabase.length === 0) {
                container.innerHTML = '<div class="empty-state">No menu items available.</div>';
                return;
            }

            let html = '';

            fooddatabase.forEach(item => {
                const name = item.name;
                const cuisine = item.cuisine;
                const origin = item.origin;
                const price = Number(item.price);
                const isVegetarian = item.vegetarian;
                const imgUrl = item.imageUrl;

                const formattedPrice = price.toLocaleString() + ' THB';

                html += `
                    <div class="menu-card">
                        <img
                            class="card-img"
                            src="${imgUrl}"
                            alt="${name}"
                            loading="lazy"
                            onerror="this.src='https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=600&h=400&fit=crop'"
                        >
                        <div class="card-body">
                            <div class="card-header">
                                <div class="card-name">${name}</div>
                                <div class="card-price">${formattedPrice}</div>
                            </div>
                            <div class="card-tags">
                                <span class="tag origin">${cuisine}</span>
                                <span class="tag origin">${origin}</span>
                                <span class="tag ${isVegetarian ? 'veg' : 'non-veg'}">${isVegetarian ? 'Vegetarian' : 'Non-Vegetarian'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        })();
    </script>

</body>
</html>
